# Rate limiting zones — included in the http {} context via conf.d/
#
# general: 10 req/s per IP for all traffic; burst allows short spikes
# login:   5 req/min per IP for the login endpoint only

limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:1m   rate=5r/m;
limit_req_status 429;

{% extends "base.html" %}
{% block title %}Shyland{% endblock %}

{% block head %}
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --border: #2a2a35;
    --text: #c8c8d4;
    --muted: #6b6b80;
    --accent: #7b68ee;
    --room: #a8d8a8;
    /* v22 brief 2 (DD §2): named palette completions — say-color is the
       named form of the old --chat; warn-color is the world-declined
       voice (three-layer doctrine, DD §3); loot-color is the named form
       of the reward green (gains: reward, pickups, heal-to-full). */
    --say-color: #f0c060;
    --warn-color: #E8D44D;
    --loot-color: #4caf7d;
    /* v22 B2 amendment 1 (#124): success-color is loot-color's general
       name for good-outcome lines; both names are valid. The combat
       family colors get names of their own. */
    --success-color: #4caf7d;
    --hit-out-color: #C4453F;
    --crit-out-color: #E24B4A;
    --hit-in-color: #E0724A;
    --crit-in-color: #F08A50;
    --system: #8888aa;
    /* v22 B2 amendment 1 (#124): error-color is the crit-out/Artifact
       red — deliberate reuse. Amendment 2 re-unified agro-color with it;
       the dual naming survives for future divergence. */
    --error: #E24B4A;
    /* v20 brief 4 (#1): location-bar fixed colors — room name near-white,
       colon separators neutral gray. Zone/area colors arrive from the
       server per message. (v22 brief 2 / DD §2: the old chrome gray is
       deleted from the palette; the separators join the muted voice.) */
    --loc-room: #E8E4D8;
    --loc-sep: var(--muted);
    /* v20 brief 4 (#2): combat-red family base values. The v20 output
       palette derives its shades from this family later. */
    --combat-bg: #3A1212;
    --combat-accent: #E24B4A;
    --conn-green: #4caf7d;
    --conn-amber: #e0a840;
    --conn-gray: #6b6b80;
    /* v21 brief 1: the ruled palette vocabulary — key-color is the
       structural-header blue (#39), value-color the room-content
       near-white. No new hex values; these name existing ones.
       (--loc-room shares value-color's hex by coincidence of ruling
       and stays independently declared per #1.) */
    --key-color: #7FB3D5;
    --value-color: #E8E4D8;
    /* v22 brief 1 (#82): agro-color strokes visited rooms with an
       aggressive spawn configured. v22 B2 amendment 2: unified back to
       error-color's red — the two names stay deliberately separable in
       the future; map code must use --agro-color, never --error. */
    --agro-color: #E24B4A;
    /* v21 brief 1 (#85): pane borders take the current zone's theme
       color at ~0.75 alpha ('BF' appended in JS when zone_color
       arrives). Fallback matches the render payload's #CCCCCC. */
    --zone-border: #CCCCCCBF;
  }

  /* v20 brief 4 amendment 1 (#73): the app fills the viewport exactly —
     the page NEVER scrolls; only designated interior panes (output,
     fight info) scroll themselves. Anchoring the shell to the
     html→body 100% chain with overflow hidden makes window-level
     overflow impossible by construction. */
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; font-size: 14px; }

  /* v20 brief 4 (#2): the ruled desktop skeleton. Baseline 1000px total;
     the right pane keeps a fixed 300px content width top-to-bottom and
     only the left regions grow when the window widens. Left column,
     stacked: location bar / output / command bar. */
  #shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 300px;
    grid-template-rows: auto minmax(0, 1fr) auto;
    height: 100%;
  }

  /* Location bar (#1): one line of text high, per-segment spans. The Area
     segment truncates first (huge flex-shrink), then Room; Zone never. */
  #loc-bar {
    grid-column: 1;
    grid-row: 1;
    display: flex;
    align-items: center;
    padding: 6px 14px;
    background: var(--surface);
    border-bottom: 5px solid var(--zone-border);
    border-right: 5px solid var(--zone-border);
    white-space: nowrap;
    overflow: hidden;
    font-size: 15px;
    font-weight: bold;
  }
  .loc-seg { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #loc-zone { flex: 0 0 auto; }
  #loc-area { flex: 0 10000 auto; min-width: 0; }
  #loc-room { flex: 0 1 auto; min-width: 0; color: var(--loc-room); }
  .loc-sep { flex: 0 0 auto; color: var(--loc-sep); white-space: pre; }
  #loc-bar.no-area #loc-area, #loc-bar.no-area #loc-sep-area { display: none; }
  #loc-bar.no-zone #loc-zone, #loc-bar.no-zone #loc-sep-zone { display: none; }

  /* Output: the one unified scrolling pane for ALL output. */
  #output-wrap {
    grid-column: 1;
    grid-row: 2;
    overflow-y: auto;
    padding: 10px 14px;
    background: var(--bg);
    border-right: 5px solid var(--zone-border);
  }
  #output { white-space: pre-wrap; line-height: 1.55; }

  /* ================================================================
     v20 brief 5 (#13/#14/#39): THE output palette — one block, ruled.
     Colors are client styling keyed on server-supplied semantic
     categories; the server never sends hex for message text. The
     combat reds are one family with the stats panel's combat state
     (#E24B4A / #3A1212) — never introduce a second red.
     ================================================================ */
  .msg-room-render { color: #B8B4A6; }           /* room-render block container */
  .room-content    { color: var(--value-color); } /* names, occupants, items */
  .msg-report  { color: #B8B4A6; }
  /* v21 brief 1 (#90/#91/#92): structured key/value report lines. */
  .msg-key   { color: var(--key-color); }
  .msg-value { color: var(--value-color); }
  /* v22 brief 2 (DD §9): segmented report lines — the server names a
     voice per segment; the client maps it to the palette. */
  .seg-key   { color: var(--key-color); }
  .seg-value { color: var(--value-color); }
  .seg-muted { color: var(--muted); }
  .seg-error { color: var(--error); }
  .seg-warn  { color: var(--warn-color); }
  .seg-say   { color: var(--say-color); }
  .seg-reward { color: var(--loot-color); }
  .msg-say     { color: var(--say-color); }      /* speech, player and NPC (DD §13) */
  .msg-combat  { color: var(--hit-out-color); }  /* engagement / generic combat */
  .msg-combat-hit-out  { color: var(--hit-out-color); }  /* your hit */
  .msg-combat-crit-out { color: var(--crit-out-color); font-weight: bold; } /* your crit */
  .msg-combat-hit-in   { color: var(--hit-in-color); }   /* it hits you */
  .msg-combat-crit-in  { color: var(--crit-in-color); font-weight: bold; } /* its crit on you (DD §2) */
  .msg-combat-miss     { color: var(--muted); }  /* miss, either direction */
  .msg-reward  { color: var(--loot-color); }     /* gains: kill / XP / level / pickups / heal-to-full */
  .msg-success { color: var(--value-color); }    /* transactional success prose (DD §6) */
  .msg-error   { color: var(--error); }          /* CLI errors (three-layer doctrine, #121) */
  .msg-warn    { color: var(--warn-color); }     /* the world declined (DD §3) */
  .msg-system  { color: var(--muted); }          /* system / ambient */
  .msg-room    { color: var(--muted); }          /* ambient room events */
  .msg-echo    { color: var(--muted); }          /* '> command' transcript (#15) */
  .msg-section         { color: #E8E4D8; margin-top: 1.55em; }
  .msg-section strong  { color: var(--key-color); font-weight: bold; }
  /* v20 brief 5 amendment 1 (#78): zone-colored separator closing the
     room block. Solid 3px bar (v21 brief 1 amendment 1: reduced from
     5px to read lighter than the 5px pane borders), rounded ends,
     Zone.theme_color fill (set inline from the render payload) at
     ~0.75 opacity; the margins bring the divider's total height to at
     least one text line (1.55em). */
  .room-sep { height: 3px; border-radius: 1.5px; opacity: .75; margin: 0.65em 0; }
  /* Rarity scale — flag block only (#48 composition, colorized here). */
  .flag-chrome   { color: #9C9A90; }             /* [ , ] Bound Unbound */
  .rar-common    { color: #9C9A90; }
  .rar-uncommon  { color: #5FA8D3; }
  .rar-rare      { color: #B387E8; }
  .rar-epic      { color: #f0c060; }  /* the say-color gold — deliberate reuse (#124) */
  .rar-legendary { color: #E0724A; }
  .rar-artifact  { color: #E24B4A; }
  /* v20 brief 2 (#32): dim local-time prefix on output lines — the
     dimmest tone in the palette. */
  .msg-ts { color: #6E6C64; font-weight: normal; }
  #cmd::placeholder            { color: var(--muted); }
  #cmd.disconnected::placeholder { color: var(--error); font-weight: bold; }

  /* Right pane (v20 brief 4, #2): stats top, fight info middle
     (scrolling), map fixed 300×300 at the bottom. */
  #side {
    grid-column: 2;
    grid-row: 1 / -1;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    font-size: 12px;
    color: var(--muted);
    min-height: 0;
    /* v20 brief 4 amendment 1 (#73/#51): the pane as a whole never
       scrolls in either axis — only #side-fight scrolls. */
    overflow: hidden;
  }
  /* v20 brief 4 amendment 1 (#71): the header is the character's name,
     verbatim — no text-transform or case styling of any kind. */
  #stats-name { font-size: 12px; font-weight: bold; color: var(--text); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #side-stats {
    flex: none;
    padding: 10px;
    background: var(--surface);
    border-bottom: 5px solid var(--zone-border);
  }
  /* v20 brief 4 (#2): the whole stats subsection turns red during combat.
     Stat text colors unchanged. */
  #side-stats.in-combat { background: var(--combat-bg); border-bottom-color: var(--combat-accent); }
  #side-stats.in-combat #stats-name { color: var(--combat-accent); }

  /* v20 brief 4 amendment 1 (#72): V/L ratio bars + the Acuity band
     gauge. Numerals stay real text (the accessible values); tracks are
     decorative (aria-hidden). Bar height matches the fight panel's. */
  #bars { display: flex; flex-direction: column; gap: 6px; font-size: 12px; margin-top: 8px; }
  .statbar { display: flex; align-items: center; gap: 6px; }
  .bar-label { flex: none; width: 10px; color: var(--muted); }
  .statbar-track, .gauge-track {
    flex: 1 1 auto;
    min-width: 0;
    height: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    position: relative;
  }
  .statbar-track { overflow: hidden; }
  /* v22 B2 amendment 2: the bar green is the loot-message green,
     verbatim — success-color, full strength. */
  .statbar-fill { height: 100%; width: 0; }
  .statbar-fill.v { background: var(--success-color); }
  .statbar-fill.l { background: var(--success-color); }
  /* Acuity band gauge: fixed 0.0–2.0 track, shaded Origin band,
     position tick clamped to the track. */
  /* v22 B2 amendment 2: the band's translucency era ends — a solid
     success-color block; the tick is the say-color gold. */
  .gauge-band { position: absolute; top: 0; bottom: 0; background: var(--success-color); }
  .gauge-tick { position: absolute; top: -2px; bottom: -2px; width: 2px; margin-left: -1px; background: var(--say-color); }
  .bar-num { flex: none; min-width: 9ch; text-align: right; color: var(--muted); }

  /* Fight info (#2): one row per enemy; scrolls on overflow; completely
     empty outside combat. */
  #side-fight {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding: 10px;
    background: var(--surface);
  }
  .fight-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .fight-focus { flex: none; width: 10px; color: var(--combat-accent); font-weight: bold; }
  .fight-name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .fight-bar { flex: none; width: 64px; height: 8px; background: var(--bg); border: 1px solid var(--combat-accent); }
  .fight-fill { height: 100%; background: var(--combat-accent); }
  .fight-nums { flex: none; color: var(--muted); font-size: 11px; }

  /* v20 brief 1 (#36): the map — fixed 300×300, at the pane bottom.
     v21 brief 1 (#85): +5px zone-colored border-top; height grows to
     305px so the SVG's 300px content box survives border-box sizing. */
  #map-wrap {
    flex: none;
    width: 300px;
    height: 305px;
    background: var(--bg);
    border-top: 5px solid var(--zone-border);
  }
  #map { display: block; }
  /* v22 brief 1 (#82): Maps V2 vocabulary. Stroke color carries room state
     (value / agro); solid fills mean points (here-dot, frontier dot);
     value-vs-muted carries known-vs-unknown everywhere. */
  .map-edge-known    { stroke: var(--value-color); stroke-width: 2; }
  .map-edge-unknown  { stroke: var(--muted); stroke-width: 2; }
  .map-gate-known    { stroke: var(--value-color); stroke-width: 2; fill: var(--value-color); }
  .map-gate-unknown  { stroke: var(--muted); stroke-width: 2; fill: var(--muted); }
  .map-room          { fill: var(--surface); stroke: var(--value-color); stroke-width: 2; }
  .map-room.agro     { stroke: var(--agro-color); }
  .map-node          { fill: var(--surface); stroke: var(--value-color); stroke-width: 4; }
  .map-frontier      { fill: var(--muted); }
  .map-here          { fill: var(--key-color); }
  .map-updown        { font: bold 14px 'Courier New', Courier, monospace; }
  .map-updown.known  { fill: var(--value-color); }
  .map-updown.unknown { fill: var(--muted); }

  /* Command bar (v20 brief 4): send button lives inside it; the
     connection indicator (#31) sits at its right end, before the button. */
  #cmd-bar {
    grid-column: 1;
    grid-row: 3;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--surface);
    border-top: 5px solid var(--zone-border);
    border-right: 5px solid var(--zone-border);
  }
  #prompt { color: var(--accent); font-size: 15px; user-select: none; }
  #cmd {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    caret-color: var(--accent);
  }
  #conn { flex: none; display: flex; align-items: center; gap: 5px; }
  #conn-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--conn-gray); }
  #conn-ms { color: var(--muted); font-size: 11px; min-width: 4ch; text-align: right; }
  #conn.conn-green #conn-dot { background: var(--conn-green); }
  #conn.conn-amber #conn-dot { background: var(--conn-amber); }
  #conn.conn-red   #conn-dot { background: var(--combat-accent); animation: conn-pulse 1s ease-in-out infinite; }
  #conn.conn-gray  #conn-dot { background: var(--conn-gray); }
  @keyframes conn-pulse { 50% { opacity: .25; } }
  #send-btn {
    flex: none;
    padding: 4px 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  #send-btn:hover { opacity: .85; }

  /* Visually hidden — for assertive ARIA live region */
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  /* Phone stacking (v20 brief 4 §0): location bar → compact stats strip
     (fight info directly under it, only while combat is active) →
     output (flex) → map below the output, reachable by scroll → command
     bar pinned last (sticky). The terminal is primary. The right pane
     dissolves (display: contents) so its children join the stack. */
  @media (max-width: 600px) {
    /* Amendment 1 (#73): the window still never scrolls at phone width —
       the shell itself becomes the interior scroll surface, keeping the
       ruled brief-4 stacking (map below the output, reachable by
       scrolling the app; command bar stays sticky-pinned). */
    #shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
    }
    #side { display: contents; }
    #loc-bar   { order: 1; border-right: none; }
    /* v21 brief 1 (#85): the borders that exist in this layout get the
       same 5px zone-colored treatment as the desktop panes. */
    #side-stats { order: 2; padding: 6px 10px; border-bottom: 5px solid var(--zone-border); }
    #side-stats #stats-name { display: none; }
    #bars { flex-direction: row; gap: 10px; margin-top: 0; }
    #bars .statbar { flex: 1 1 0; min-width: 0; }
    #bars .bar-num { min-width: 0; }
    #side-fight { order: 3; display: none; flex: none; max-height: 96px; border-bottom: 5px solid var(--zone-border); background: var(--surface); }
    #shell.has-fight #side-fight { display: block; }
    #output-wrap { order: 4; border-right: none; height: calc(100vh - 150px); height: calc(100svh - 150px); min-height: 240px; }
    #map-wrap { order: 5; margin: 0 auto; width: 310px; height: 310px; border: 5px solid var(--zone-border); }
    #cmd-bar { order: 6; position: sticky; bottom: 0; z-index: 10; border-right: none; }
  }
</style>
{% endblock %}

{% block content %}
<div id="shell">

  <div id="loc-bar" class="no-zone no-area">
    <span id="loc-zone" class="loc-seg"></span><span id="loc-sep-zone" class="loc-sep">: </span><span id="loc-area" class="loc-seg"></span><span id="loc-sep-area" class="loc-sep">: </span><span id="loc-room" class="loc-seg">Connecting…</span>
  </div>

  <main id="output-wrap">
    <div id="output" role="log" aria-live="polite" aria-label="Game output" aria-atomic="false"></div>
  </main>

  <aside id="side">
    <div id="side-stats">
      <!-- v20 brief 4 amendment 1 (#71): the character's name, verbatim
           from state sync — never client-derived, never case-styled. -->
      <h2 id="stats-name">&nbsp;</h2>
      <div id="bars">
        <div class="statbar"><span class="bar-label">V</span><div class="statbar-track" aria-hidden="true"><div id="bar-v-fill" class="statbar-fill v"></div></div><span id="bar-v" class="bar-num">—</span></div>
        <div class="statbar"><span class="bar-label">A</span><div class="gauge-track" aria-hidden="true"><div id="gauge-band" class="gauge-band"></div><div id="gauge-tick" class="gauge-tick"></div></div><span id="bar-a" class="bar-num">—</span></div>
        <div class="statbar"><span class="bar-label">L</span><div class="statbar-track" aria-hidden="true"><div id="bar-l-fill" class="statbar-fill l"></div></div><span id="bar-l" class="bar-num">—</span></div>
      </div>
    </div>
    <!-- v20 brief 4 (#2): fight info — the map's accessible source of
         truth remains the combat text in the output; this pane is a
         visual summary. -->
    <div id="side-fight" aria-hidden="true"></div>
    <!-- v20 brief 1 (#36): the map is decorative for assistive tech — room
         descriptions and exits in the output remain the accessible source
         of truth; the map adds no information not already present in text. -->
    <div id="map-wrap" aria-hidden="true">
      <svg id="map" width="300" height="300" viewBox="0 0 300 300"></svg>
    </div>
  </aside>

  <!-- Assertive live region for combat alerts (off-screen) -->
  <div id="combat-live" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

  <div id="cmd-bar">
    <span id="prompt" aria-hidden="true">&gt;</span>
    <input id="cmd" type="text" autocomplete="off" autocorrect="off" autocapitalize="off"
           spellcheck="false" aria-label="Command input" placeholder="Connecting…" />
    <!-- v20 brief 4 (#31): connection indicator. Accessible label updates
         but this is deliberately NOT a live region — no announcements. -->
    <span id="conn" class="conn-gray" role="img" aria-label="Connecting">
      <span id="conn-dot" aria-hidden="true"></span><span id="conn-ms" aria-hidden="true"></span>
    </span>
    <button id="send-btn">SEND</button>
  </div>

</div>

<script>
(function () {
  const shell    = document.getElementById('shell');
  const output   = document.getElementById('output');
  const outputWrap = document.getElementById('output-wrap');
  const cmd      = document.getElementById('cmd');
  const sendBtn  = document.getElementById('send-btn');
  const locBar   = document.getElementById('loc-bar');
  const locZone  = document.getElementById('loc-zone');
  const locArea  = document.getElementById('loc-area');
  const locRoom  = document.getElementById('loc-room');
  const barV     = document.getElementById('bar-v');
  const barA     = document.getElementById('bar-a');
  const barL     = document.getElementById('bar-l');
  const statsName = document.getElementById('stats-name');
  const barVFill = document.getElementById('bar-v-fill');
  const barLFill = document.getElementById('bar-l-fill');
  const gaugeBand = document.getElementById('gauge-band');
  const gaugeTick = document.getElementById('gauge-tick');
  const sideStats  = document.getElementById('side-stats');
  const sideFight  = document.getElementById('side-fight');
  const combatLive = document.getElementById('combat-live');
  const mapSvg     = document.getElementById('map');
  const conn       = document.getElementById('conn');
  const connMs     = document.getElementById('conn-ms');

  const history = [];
  let histIdx = -1;
  let quitting = false;
  // v21.1 (#116): set when a newer connection takes over this character.
  // The close handler then suppresses the reconnect placeholder and the
  // reconnect loop — the farewell stays visible; refresh retakes.
  let superseded = false;

  // v20 brief 3 (#45): whether stamped categories show their [HH:MM:SS.ss]
  // prefix. Server-authoritative — carried by the connect-time verbs
  // message and every status payload.
  let showTimestamps = true;
  // v22 brief 2 (DD §10): pane-only echo preference — when off, the
  // player's own '> command' echo lines are not rendered. Same carriage
  // as show_timestamps; never affects anything beyond the pane.
  let echoMode = true;

  // v20 brief 3 (#19): tab completion. Verb position completes locally
  // from the server-sent verb list; argument position asks the server.
  let verbList = [];
  let tabState = null;        // { base, options, idx }
  let pendingComplete = null; // line text awaiting a server reply

  // ------------------------------------------------------------------
  // Connection + indicator (v20 brief 4, #31)
  // ------------------------------------------------------------------
  // Client pings every 10s with an incrementing nonce; the server echoes
  // it back and RTT is computed from the round-trip. Green: fresh pong,
  // RTT < 250ms. Amber: RTT >= 250ms or one missed pong. Red pulsing:
  // reconnection in progress. Gray: disconnected/closed.

  const PING_INTERVAL_MS = 10000;
  const RTT_DEGRADED_MS = 250;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${proto}://${location.host}/ws/shyland/`;

  let ws = null;
  let reconnectDelay = 1000;
  let pingTimer = null;
  let pingNonce = 0;
  let awaitingNonce = null;   // last ping not yet answered
  let pingSent = {};          // nonce -> performance.now() at send
  let lastRtt = null;
  let missedPongs = 0;

  function setConn(state, label, ms) {
    conn.className = 'conn-' + state;
    conn.setAttribute('aria-label', label);
    connMs.textContent = (ms === null || ms === undefined) ? '' : ms + 'ms';
  }

  function updateConnHealth() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (missedPongs >= 1) {
      setConn('amber', 'Connection degraded', lastRtt);
    } else if (lastRtt !== null && lastRtt >= RTT_DEGRADED_MS) {
      setConn('amber', 'Connected, ' + lastRtt + ' ms (degraded)', lastRtt);
    } else if (lastRtt !== null) {
      setConn('green', 'Connected, ' + lastRtt + ' ms', lastRtt);
    }
  }

  function sendPing() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (awaitingNonce !== null) {
      missedPongs++;
      updateConnHealth();
    }
    pingNonce++;
    awaitingNonce = pingNonce;
    pingSent[pingNonce] = performance.now();
    ws.send(JSON.stringify({ type: 'ping', nonce: pingNonce }));
  }

  function stopPings() {
    if (pingTimer !== null) { clearInterval(pingTimer); pingTimer = null; }
    awaitingNonce = null;
    pingSent = {};
  }

  function handlePong(msg) {
    const sentAt = pingSent[msg.nonce];
    if (sentAt === undefined) return;
    delete pingSent[msg.nonce];
    if (msg.nonce === awaitingNonce) awaitingNonce = null;
    lastRtt = Math.max(1, Math.round(performance.now() - sentAt));
    missedPongs = 0;
    updateConnHealth();
  }

  function connect() {
    ws = new WebSocket(wsUrl);

    ws.addEventListener('open', () => {
      reconnectDelay = 1000;
      lastRtt = null;
      missedPongs = 0;
      cmd.classList.remove('disconnected');
      cmd.placeholder = 'Connected to Shyland. Enter a command…';
      cmd.focus();
      // Indicator returns to green on the first pong.
      stopPings();
      sendPing();
      pingTimer = setInterval(sendPing, PING_INTERVAL_MS);
    });

    ws.addEventListener('close', () => {
      stopPings();
      lastRtt = null;
      missedPongs = 0;
      if (quitting || superseded) {
        setConn('gray', 'Disconnected', null);
        return;
      }
      cmd.classList.add('disconnected');
      cmd.placeholder = 'Connection lost. Reconnecting…';
      setConn('red', 'Reconnecting', null);
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 10000);
    });

    ws.addEventListener('message', onMessage);
  }

  function onMessage(e) {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.event === 'quit') {
      quitting = true;
      setConn('gray', 'Disconnected', null);
      // Let the farewell line render (and be announced) before navigating.
      setTimeout(() => { window.location.href = '{% url "home" %}'; }, 1000);
      return;
    }

    if (msg.event === 'superseded') {
      // v21.1 (#116): no navigation, no reload — the farewell already
      // rendered through the normal output path and stays on screen.
      superseded = true;
      return;
    }

    if (msg.type === 'clear') {
      output.innerHTML = '';
    } else if (msg.type === 'output') {
      if (msg.category === 'room-render') {
        if (msg.enter) output.innerHTML = '';
        renderRoom(msg);
      } else {
        append(msg);
        // v20 brief 5: combat categories are a family (combat-hit-out,
        // combat-miss, …) — all of them announce assertively.
        if (msg.category && msg.category.indexOf('combat') === 0) {
          combatLive.textContent = '';
          requestAnimationFrame(() => { combatLive.textContent = msg.text; });
        }
      }
    } else if (msg.type === 'redirect' && msg.url) {
      quitting = true;
      window.location.href = msg.url;
    } else if (msg.type === 'map') {
      renderMap(msg);
    } else if (msg.type === 'fight') {
      renderFight(msg);
    } else if (msg.type === 'pong') {
      handlePong(msg);
    } else if (msg.type === 'verbs') {
      if (Array.isArray(msg.verbs)) verbList = msg.verbs;
      if (typeof msg.show_timestamps === 'boolean') showTimestamps = msg.show_timestamps;
      if (typeof msg.echo_mode === 'boolean') echoMode = msg.echo_mode;
    } else if (msg.type === 'complete') {
      applyCompletion(msg);
    } else if (msg.type === 'status') {
      if (typeof msg.show_timestamps === 'boolean') showTimestamps = msg.show_timestamps;
      if (typeof msg.echo_mode === 'boolean') echoMode = msg.echo_mode;
      updateLocation(msg);
      // v20 brief 4 (#2): combat-membership boolean drives the stats
      // section's combat-red state.
      if (typeof msg.in_combat === 'boolean') {
        sideStats.classList.toggle('in-combat', msg.in_combat);
      }
      // v20 brief 4 amendment 1 (#71): verbatim server-supplied name.
      if (typeof msg.character_name === 'string' && msg.character_name) {
        statsName.textContent = msg.character_name;
      }
      barV.textContent = msg.vitality_max !== undefined
        ? `${msg.vitality} / ${msg.vitality_max}`
        : `${msg.vitality}`;
      // One decimal, matching the `stats` command's Acuity rendering.
      barA.textContent = typeof msg.acuity === 'number'
        ? msg.acuity.toFixed(1) : msg.acuity;
      barL.textContent = msg.longevity_max !== undefined
        ? `${msg.longevity} / ${msg.longevity_max}`
        : `${msg.longevity}`;
      updateStatBars(msg);
    }
  }

  // v20 brief 4 amendment 1 (#72): V/L ratio bars and the Acuity band
  // gauge (fixed 0.0–2.0 track; shaded Origin band from server-supplied
  // acuity_band_low/high; position tick clamped to the track).
  const ACUITY_TRACK_MAX = 2.0;

  function ratioPct(cur, max) {
    if (typeof cur !== 'number' || typeof max !== 'number' || max <= 0) return null;
    return Math.max(0, Math.min(100, (cur / max) * 100)) + '%';
  }

  function trackPct(value) {
    return Math.max(0, Math.min(100, (value / ACUITY_TRACK_MAX) * 100)) + '%';
  }

  function updateStatBars(msg) {
    const v = ratioPct(msg.vitality, msg.vitality_max);
    if (v !== null) barVFill.style.width = v;
    const l = ratioPct(msg.longevity, msg.longevity_max);
    if (l !== null) barLFill.style.width = l;
    if (typeof msg.acuity_band_low === 'number' && typeof msg.acuity_band_high === 'number'
        && msg.acuity_band_high >= msg.acuity_band_low) {
      gaugeBand.style.left = trackPct(msg.acuity_band_low);
      gaugeBand.style.width = Math.max(0,
        (Math.min(msg.acuity_band_high, ACUITY_TRACK_MAX) - Math.max(msg.acuity_band_low, 0))
        / ACUITY_TRACK_MAX * 100) + '%';
    }
    if (typeof msg.acuity === 'number') {
      gaugeTick.style.left = trackPct(msg.acuity);
    }
  }

  // v20 brief 4 (#1): location bar — Zone: Area: Room, colors delivered
  // by the server (nothing computed client-side). Area (and its colon)
  // is omitted when the room has no Area.
  function updateLocation(msg) {
    if (msg.zone_name !== undefined) {
      locZone.textContent = msg.zone_name || '';
      locZone.style.color = msg.zone_color || '#CCCCCC';
      locBar.classList.toggle('no-zone', !msg.zone_name);
      const hasArea = !!msg.area_name;
      locArea.textContent = hasArea ? msg.area_name : '';
      locArea.style.color = hasArea ? (msg.area_color || '#CCCCCC') : '';
      locBar.classList.toggle('no-area', !hasArea);
    }
    if (msg.room_name !== undefined && msg.room_name !== '') {
      locRoom.textContent = msg.room_name;
    }
  }

  // v20 brief 4 (#2): fight-info pane. One row per enemy: focus marker,
  // name, hp bar, hp/hp_max numerals. Completely empty when inactive.
  function renderFight(msg) {
    sideFight.innerHTML = '';
    const active = msg.active === true;
    shell.classList.toggle('has-fight', active);
    if (!active || !Array.isArray(msg.enemies)) return;
    msg.enemies.forEach((enemy) => {
      const row = document.createElement('div');
      row.className = 'fight-row';

      const focus = document.createElement('span');
      focus.className = 'fight-focus';
      focus.textContent = enemy.focused ? '»' : '';
      row.appendChild(focus);

      const name = document.createElement('span');
      name.className = 'fight-name';
      name.textContent = enemy.name;
      row.appendChild(name);

      const bar = document.createElement('div');
      bar.className = 'fight-bar';
      const fill = document.createElement('div');
      fill.className = 'fight-fill';
      const hpMax = Number(enemy.hp_max) || 0;
      const hp = Math.max(0, Math.min(Number(enemy.hp) || 0, hpMax));
      fill.style.width = hpMax > 0 ? ((hp / hpMax) * 100) + '%' : '0%';
      bar.appendChild(fill);
      row.appendChild(bar);

      const nums = document.createElement('span');
      nums.className = 'fight-nums';
      nums.textContent = `${hp}/${hpMax}`;
      row.appendChild(nums);

      sideFight.appendChild(row);
    });
  }

  // v22 brief 1 (#82, #115): Maps V2 renderer. North is up; fixed 7×7 cell
  // window (radius 3) centered on the current room, drawn inside a pinned
  // 16px margin (268×268 drawable area centered in the unchanged 300×300
  // SVG — #115). Rooms outside the window are not drawn. Every map message
  // discards and fully re-renders.
  const MAP_SIZE = 300, MARGIN = 16, INNER = MAP_SIZE - 2 * MARGIN;
  const MAP_RADIUS = 3, CELL = INNER / 7;
  const MAP_DELTA = { north: [0, 1], south: [0, -1], east: [1, 0], west: [-1, 0] };
  // Attachment law: anything attaching to a glyph starts at the outer edge
  // of its stroke, never the geometric radius — circle 10 + 1 = 11; octagon
  // apothem 12·cos 22.5° ≈ 11.09 + 2 = 13.09.
  const ROOM_R = 10, ROOM_EDGE = ROOM_R + 1;
  const OCT_R = 12, OCT_EDGE = OCT_R * Math.cos(Math.PI / 8) + 2;
  const GATE_LINE = 8, GATE_SIDE = 10;
  // Badge tuck (v22 brief 1 amendment 1): each U/D badge sits as close to
  // its glyph as possible without touching — the letter's ink clears the
  // glyph's outer stroke edge by ~0.5px on the 45° diagonal (the attachment
  // law's spirit applied to text). Offsets are derived from the measured
  // rendered ink of 14px bold Courier New (U/D ink ≈6.8px wide, spanning
  // −4.2..+5.0px vertically around the placement point); if the rendering
  // font's metrics ever change, re-derive under closest-without-touching.
  const BADGE_OFF_ROOM = 12.25, BADGE_OFF_NODE = 13.75;

  function renderMap(msg) {
    while (mapSvg.firstChild) mapSvg.removeChild(mapSvg.firstChild);
    if (!msg.current || !msg.rooms) return;
    const cx0 = msg.current.x, cy0 = msg.current.y;
    const NS = 'http://www.w3.org/2000/svg';
    const el = (tag, attrs) => {
      const e = document.createElementNS(NS, tag);
      for (const k in attrs) e.setAttribute(k, attrs[k]);
      return e;
    };
    const px = (x) => MARGIN + INNER / 2 + (x - cx0) * CELL;
    const py = (y) => MARGIN + INNER / 2 - (y - cy0) * CELL;   // north is up
    const inWindow = (r) => Math.abs(r.x - cx0) <= MAP_RADIUS && Math.abs(r.y - cy0) <= MAP_RADIUS;
    const byCell = new Map();
    msg.rooms.forEach((r) => byCell.set(r.x + ',' + r.y, r));
    const drawn = msg.rooms.filter(inWindow);
    const isGate = (status) => status === 'gate-known' || status === 'gate-unknown';

    // Edges first so glyphs draw over them. Frontier rooms draw no exits
    // of their own — only lines from discovered rooms reach them.
    drawn.forEach((r) => {
      if (!r.discovered) return;
      const x = px(r.x), y = py(r.y);
      for (const dir in (r.exits || {})) {
        const d = MAP_DELTA[dir];
        if (!d) continue;
        const status = r.exits[dir];
        if (isGate(status)) continue;   // gates render as glyph attachments
        const cls = status === 'known' ? 'map-edge-known' : 'map-edge-unknown';
        const nb = byCell.get((r.x + d[0]) + ',' + (r.y + d[1]));
        if (nb && inWindow(nb)) {
          mapSvg.appendChild(el('line', {
            x1: x, y1: y, x2: px(nb.x), y2: py(nb.y), class: cls,
          }));
        } else {
          // Destination outside the window: solid half-cell stub.
          mapSvg.appendChild(el('line', {
            x1: x, y1: y,
            x2: x + d[0] * CELL / 2, y2: y - d[1] * CELL / 2, class: cls,
          }));
        }
      }
    });

    // Glyphs: gate attachments, then the room shape.
    drawn.forEach((r) => {
      const x = px(r.x), y = py(r.y);
      if (!r.discovered) {
        // Frontier room: solid muted dot at half diameter, no stroke.
        mapSvg.appendChild(el('circle', { cx: x, cy: y, r: 5, class: 'map-frontier' }));
        return;
      }
      const isNode = !!r.travel_node;
      const edge = isNode ? OCT_EDGE : ROOM_EDGE;
      for (const dir in (r.exits || {})) {
        const status = r.exits[dir];
        if (!isGate(status)) continue;
        const d = MAP_DELTA[dir];
        if (!d) continue;
        const cls = status === 'gate-known' ? 'map-gate-known' : 'map-gate-unknown';
        const ux = d[0], uy = -d[1];   // outward unit vector, screen space
        const sx = x + ux * edge, sy = y + uy * edge;
        const bx = sx + ux * GATE_LINE, by = sy + uy * GATE_LINE;
        mapSvg.appendChild(el('line', { x1: sx, y1: sy, x2: bx, y2: by, class: cls }));
        // Solid equilateral triangle: base midpoint at the line end, apex
        // a further side·√3/2 out.
        const ax = bx + ux * GATE_SIDE * Math.sqrt(3) / 2;
        const ay = by + uy * GATE_SIDE * Math.sqrt(3) / 2;
        const hx = -uy * GATE_SIDE / 2, hy = ux * GATE_SIDE / 2;
        mapSvg.appendChild(el('polygon', {
          points: (bx + hx) + ',' + (by + hy) + ' ' + (bx - hx) + ',' + (by - hy)
                  + ' ' + ax + ',' + ay,
          class: cls,
        }));
      }
      if (isNode) {
        // Travel node: octagon, flat sides facing the cardinals. Never agro.
        const pts = [];
        for (let k = 0; k < 8; k++) {
          const a = Math.PI / 8 + k * Math.PI / 4;   // 22.5° + 45k°
          pts.push((x + OCT_R * Math.cos(a)) + ',' + (y + OCT_R * Math.sin(a)));
        }
        mapSvg.appendChild(el('polygon', { points: pts.join(' '), class: 'map-node' }));
      } else {
        mapSvg.appendChild(el('circle', {
          cx: x, cy: y, r: ROOM_R,
          class: 'map-room' + (r.agro ? ' agro' : ''),
        }));
      }
    });

    // Here-dot and badges last.
    drawn.forEach((r) => {
      if (!r.discovered) return;
      const x = px(r.x), y = py(r.y);
      if (r.here) {
        mapSvg.appendChild(el('circle', { cx: x, cy: y, r: 6, class: 'map-here' }));
      }
      const off = r.travel_node ? BADGE_OFF_NODE : BADGE_OFF_ROOM;
      [['up', 'U', -1], ['down', 'D', 1]].forEach(([dir, label, sign]) => {
        const status = r[dir];
        if (!status) return;
        const badge = el('text', {
          x: x + off, y: y + sign * off + 5, 'text-anchor': 'middle',
          class: 'map-updown ' + (status === 'known' ? 'known' : 'unknown'),
        });
        badge.textContent = label;
        mapSvg.appendChild(badge);
      });
    });
  }

  // v20 brief 2 (#32): dim [HH:MM:SS.ss] prefix in the player's local
  // time, derived from the server's epoch-ms `ts`. aria-hidden so the
  // live region announces message text clean, without timestamp noise.
  // Amendment 1 (#56): timestamps mark events, not renderings — the
  // prefix displays only on stamped categories. The server assigns the
  // category; the client never infers stamping from message text, and an
  // unknown category defaults to stamped (events are the common case).
  // The timestamps on|off preference (#45, commands brief) will govern
  // stamped categories only — unstamped categories are never stamped.
  const UNSTAMPED_CATEGORIES = new Set(['room-render', 'report']);

  function tsSpan(ts) {
    if (typeof ts !== 'number') return null;
    const d = new Date(ts);
    const p2 = (n) => String(n).padStart(2, '0');
    const span = document.createElement('span');
    span.className = 'msg-ts';
    span.setAttribute('aria-hidden', 'true');
    span.textContent = `[${p2(d.getHours())}:${p2(d.getMinutes())}:${p2(d.getSeconds())}.${p2(Math.floor(d.getMilliseconds() / 10))}] `;
    return span;
  }

  // v20 brief 5 (#14 rarity rider): the item-line flag block —
  // "[Rarity, Bound|Unbound]" or "[Bound|Unbound]" — renders its
  // color scale; brackets, commas, and the bind word stay chrome gray.
  // Purely presentational: the text content is unchanged. v21 brief 1
  // (#60): the bind word is now "Unbound" — this regex changes in
  // lockstep with item_utils.get_item_flags or colorization breaks.
  const FLAG_RE = /\[(?:(Common|Uncommon|Rare|Epic|Legendary|Artifact), )?(Bound|Unbound)\]/g;

  function appendFlaggedText(el, text) {
    let last = 0, m;
    FLAG_RE.lastIndex = 0;
    while ((m = FLAG_RE.exec(text)) !== null) {
      if (m.index > last) el.appendChild(document.createTextNode(text.slice(last, m.index)));
      const chrome = (t) => {
        const s = document.createElement('span');
        s.className = 'flag-chrome';
        s.textContent = t;
        el.appendChild(s);
      };
      if (m[1]) {
        chrome('[');
        const r = document.createElement('span');
        r.className = 'rar-' + m[1].toLowerCase();
        r.textContent = m[1];
        el.appendChild(r);
        chrome(', ' + m[2] + ']');
      } else {
        chrome('[' + m[2] + ']');
      }
      last = m.index + m[0].length;
    }
    if (last < text.length) el.appendChild(document.createTextNode(text.slice(last)));
  }

  // v20 brief 5 (#14/#39) + amendment 1 (#77/#78): the ruled room
  // structure — prose first (no bracket header; place identity lives in
  // the location bar), Exits, Who's here?, What's here?, then the
  // zone-colored separator framing the block against event lines below.
  // Empty sections were omitted server-side.
  function renderRoom(msg) {
    // v21 brief 1 (#85): the pane borders take the current zone's color
    // at ~0.75 alpha, from the same server-delivered zone_color the
    // closing separator consumes.
    if (typeof msg.zone_color === 'string' && /^#[0-9a-fA-F]{6}$/.test(msg.zone_color)) {
      document.documentElement.style.setProperty('--zone-border', msg.zone_color + 'BF');
    }

    const block = document.createElement('div');
    block.className = 'msg-room-render';

    // v21 brief 1 (#86): area prose in the Area's theme color, then a
    // blank line, then room prose in value-color — matching the
    // location bar's segment colors. The payload carries them as
    // separate fields; the old concatenated `text` is gone.
    if (msg.area_text) {
      const a = document.createElement('div');
      a.style.color = msg.area_color || 'var(--value-color)';
      a.textContent = msg.area_text;
      block.appendChild(a);
      const gap = document.createElement('div');
      gap.appendChild(document.createElement('br'));
      block.appendChild(gap);
    }
    if (msg.room_text) {
      const p = document.createElement('div');
      p.style.color = 'var(--value-color)';
      p.textContent = msg.room_text;
      block.appendChild(p);
    }

    // Inline section: "Label: content" on one line (Exits, Players here).
    const inlineSection = (label, content) => {
      const el = document.createElement('div');
      el.className = 'msg-section';
      const strong = document.createElement('strong');
      strong.textContent = label;
      el.appendChild(strong);
      const span = document.createElement('span');
      span.className = 'room-content';
      span.textContent = ' ' + content;
      el.appendChild(span);
      block.appendChild(el);
    };

    // Block section: header label line, then one content line per entry.
    const listSection = (label, lines) => {
      if (!lines || !lines.length) return;
      const hdr = document.createElement('div');
      hdr.className = 'msg-section';
      const strong = document.createElement('strong');
      strong.textContent = label;
      hdr.appendChild(strong);
      block.appendChild(hdr);
      lines.forEach((line) => {
        const el = document.createElement('div');
        el.className = 'room-content';
        appendFlaggedText(el, line);
        block.appendChild(el);
      });
    };

    if (msg.exits) inlineSection('Exits:', msg.exits);
    if (msg.players) inlineSection('Players here:', msg.players);
    listSection("Who's here?", msg.who);
    listSection("What's here?", msg.what);

    // Amendment 1 (#78): zone-colored separator — once per room render,
    // after the final room-block line. Decorative (aria-hidden), part of
    // the room-rendering category so it is never stamped. Color is the
    // server-supplied Zone.theme_color riding this render.
    const sep = document.createElement('div');
    sep.className = 'room-sep';
    sep.setAttribute('aria-hidden', 'true');
    sep.style.background = msg.zone_color || '#CCCCCC';
    block.appendChild(sep);

    output.appendChild(block);
    outputWrap.scrollTop = outputWrap.scrollHeight;
  }

  // v21 brief 1 (#90/#91/#92): structured key/value report form. Each
  // `lines` entry renders as one output line — `k` in key-color, `v` in
  // value-color, concatenated in that order; an entry with neither is a
  // blank line. Value text passes through appendFlaggedText so item
  // flag blocks keep their rarity/chrome colorization (design rule 3).
  // v22 brief 2 (DD §9): a report line may instead carry 'segs' — an
  // array of {t, c} segments where c names a palette voice (key, value,
  // muted, error, warn, say, reward, rar-*, flag-chrome). Used for the
  // Kind-3 tables: muted column headers, band-colored durability, and
  // rarity-colored words inside otherwise value-colored rows.
  const SEG_CLASSES = new Set([
    'key', 'value', 'muted', 'error', 'warn', 'say', 'reward',
  ]);
  function appendReportLines(lines) {
    lines.forEach((entry) => {
      const el = document.createElement('div');
      el.className = 'msg-report';
      if (Array.isArray(entry.segs)) {
        entry.segs.forEach((seg) => {
          const s = document.createElement('span');
          const c = seg.c || 'value';
          if (SEG_CLASSES.has(c)) {
            s.className = 'seg-' + c;
          } else if (/^(rar-[a-z]+|flag-chrome)$/.test(c)) {
            s.className = c;
          } else {
            s.className = 'seg-value';
          }
          s.textContent = seg.t || '';
          el.appendChild(s);
        });
        output.appendChild(el);
        return;
      }
      const hasK = typeof entry.k === 'string' && entry.k !== '';
      const hasV = typeof entry.v === 'string' && entry.v !== '';
      if (!hasK && !hasV) {
        el.appendChild(document.createElement('br'));
      } else {
        if (hasK) {
          const k = document.createElement('span');
          k.className = 'msg-key';
          k.textContent = entry.k;
          el.appendChild(k);
        }
        if (hasV) {
          const v = document.createElement('span');
          v.className = 'msg-value';
          appendFlaggedText(v, entry.v);
          el.appendChild(v);
        }
      }
      output.appendChild(el);
    });
    outputWrap.scrollTop = outputWrap.scrollHeight;
  }

  function append(msg) {
    // v22 brief 2 (DD §10): echo is a pane-only preference — off means
    // the player's own command-echo lines simply don't render.
    if (msg.category === 'echo' && !echoMode) return;
    if (msg.category === 'report' && Array.isArray(msg.lines)) {
      appendReportLines(msg.lines);
      return;
    }
    const el = document.createElement('div');
    el.className = `msg-${msg.category || 'system'}`;
    if (msg.hint_exits) { el.style.marginTop = '1.55em'; el.style.fontWeight = 'bold'; }
    // #45: the toggle governs stamped categories only — unstamped
    // categories are never stamped regardless.
    if (showTimestamps && !UNSTAMPED_CATEGORIES.has(msg.category)) {
      const ts = tsSpan(msg.ts);
      if (ts) el.appendChild(ts);
    }
    appendFlaggedText(el, msg.text);
    output.appendChild(el);
    if (msg.hint_exits) {
      appendSection('Exits:', msg.hint_exits, '1.55em');
    }
    outputWrap.scrollTop = outputWrap.scrollHeight;
  }

  function appendSection(label, text, marginTop) {
    const el = document.createElement('div');
    el.className = 'msg-section';
    el.style.marginTop = marginTop;
    const strong = document.createElement('strong');
    strong.textContent = label;
    el.appendChild(strong);
    el.appendChild(document.createTextNode(' ' + text));
    output.appendChild(el);
  }

  function send() {
    const text = cmd.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    history.unshift(text);
    if (history.length > 100) history.pop();
    histIdx = -1;
    clearCompletion();
    ws.send(JSON.stringify({ text }));
    cmd.value = '';
    cmd.focus();
  }

  sendBtn.addEventListener('click', send);

  // v20 brief 3 (#19): apply a server completion reply. Stale or
  // cancelled replies (Escape, edited line) are dropped.
  function applyCompletion(msg) {
    if (pendingComplete === null || msg.text !== pendingComplete) return;
    const line = pendingComplete;
    pendingComplete = null;
    if (!Array.isArray(msg.options) || !msg.options.length) return;
    const m = line.match(/^(.*?)(\S*)$/);
    tabState = { base: m[1], options: msg.options, idx: 0 };
    cmd.value = tabState.base + tabState.options[0];
  }

  function clearCompletion() {
    tabState = null;
    pendingComplete = null;
  }

  function handleTab() {
    if (tabState && tabState.options.length) {
      tabState.idx = (tabState.idx + 1) % tabState.options.length;
      cmd.value = tabState.base + tabState.options[tabState.idx];
      return;
    }
    const line = cmd.value;
    if (!line.trim()) return;
    if (!/\s/.test(line.trim())) {
      // Verb position: complete/cycle locally from the server-sent list.
      const partial = line.trim().toLowerCase();
      const options = verbList.filter((v) => v.startsWith(partial));
      if (options.length) {
        tabState = { base: '', options: options, idx: 0 };
        cmd.value = options[0];
      }
      return;
    }
    // Argument position: server-computed candidates.
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    pendingComplete = line;
    ws.send(JSON.stringify({ type: 'complete', text: line }));
  }

  cmd.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') { e.preventDefault(); handleTab(); return; }
    if (e.key === 'Escape') { clearCompletion(); return; }
    if (e.key !== 'Shift' && e.key !== 'Control' && e.key !== 'Alt' && e.key !== 'Meta') {
      // Typing (or history navigation) resumes normal input.
      clearCompletion();
    }
    if (e.key === 'Enter') { send(); return; }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (histIdx < history.length - 1) { histIdx++; cmd.value = history[histIdx]; }
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx > 0) { histIdx--; cmd.value = history[histIdx]; }
      else if (histIdx === 0) { histIdx = -1; cmd.value = ''; }
    }
  });

  connect();
})();
</script>

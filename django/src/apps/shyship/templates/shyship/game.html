{% load static profile_tags %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHYSHIP</title>
    <link rel="stylesheet" href="{% static 'shyship/styles.css' %}" />
  </head>
  <body>
    <main class="app">
      <div class="app-header">
        <a href="{% url 'shyship:lobby' %}" class="secondary-button">&#8592; Shyship</a>
        <h1 class="app-title">SHYSHIP</h1>
        <div class="user-pane">
          <span class="user-pane-name">{{ request.user|display_name }}</span>
          <form method="post" action="{% url 'shyship:logout' %}" style="margin:0">
            {% csrf_token %}
            <button type="submit" class="user-pane-action">Logout</button>
          </form>
        </div>
      </div>

      <section class="game-shell" aria-label="Shyship game">
        <div class="game-topbar">
          <div
            id="status-bar"
            class="status-bar"
            role="status"
            aria-live="polite"
          >Connecting…</div>
          <div class="topbar-player">
            <form id="cancel-form" method="post" action="{% url 'shyship:cancel' game.id %}" hidden>
              {% csrf_token %}
            </form>
            <button type="button" class="danger-button" id="cancel-btn" hidden>CANCEL GAME</button>
            <form id="forfeit-form" method="post" action="{% url 'shyship:forfeit' game.id %}" hidden>
              {% csrf_token %}
            </form>
            <button type="button" class="danger-button" id="forfeit-btn" hidden>FORFEIT GAME</button>
            <button type="button" class="secondary-button" id="auto-btn">AUTO</button>
          </div>
        </div>

        <div class="play-area">
          <div class="board-panel board-panel--enemy" id="enemy-panel">
            <button class="board-title" id="board-title-enemy" type="button">ENEMY FLEET</button>
            <div id="enemy-grid" class="sea-grid" aria-label="Enemy board"></div>
          </div>
          <div class="board-panel" id="own-panel">
            <button class="board-title" id="board-title-own" type="button">MY FLEET</button>
            <div id="own-grid" class="sea-grid" aria-label="Your board"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- Enemy fire notification modal -->
    <div id="fire-notify-modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="fire-notify-title">
      <div class="modal-backdrop"></div>
      <div class="modal-panel">
        <h2 id="fire-notify-title" class="modal-title"></h2>
        <p id="fire-notify-text" class="modal-text"></p>
        <div class="modal-actions">
          <button id="fire-notify-ok" class="modal-button modal-button-cancel">OK</button>
        </div>
      </div>
    </div>

    <!-- Waiting for opponent overlay -->
    <div
      id="waiting-overlay"
      class="modal{% if game.status == 'waiting' %} is-open{% endif %}"
      aria-hidden="{% if game.status == 'waiting' %}false{% else %}true{% endif %}"
      role="dialog"
      aria-modal="true"
      aria-labelledby="waiting-title"
    >
      <div class="modal-backdrop"></div>
      <div class="modal-panel">
        <h2 id="waiting-title" class="modal-title">Waiting for opponent</h2>
        <p class="modal-text">Share this page URL with a friend to start the game.</p>
        <div class="modal-actions">
          <a href="{% url 'shyship:lobby' %}" class="modal-button modal-button-cancel">&#8592; Shyship</a>
          <form method="post" action="{% url 'shyship:vs_computer' game.id %}" style="flex:1 1 0">
            {% csrf_token %}
            <button type="submit" class="modal-button modal-button-primary" style="width:100%">PLAY THE COMPUTER</button>
          </form>
          <button type="button" class="modal-button modal-button-danger" id="cancel-overlay-btn">CANCEL GAME</button>
        </div>
      </div>
    </div>

    <!-- Confirmation modal -->
    <div id="confirm-modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
      <div class="modal-backdrop"></div>
      <div class="modal-panel">
        <h2 id="confirm-modal-title" class="modal-title"></h2>
        <p id="confirm-modal-text" class="modal-text"></p>
        <div class="modal-actions">
          <button id="confirm-no" class="modal-button modal-button-cancel">BACK</button>
          <button id="confirm-yes" class="modal-button modal-button-danger">CONFIRM</button>
        </div>
      </div>
    </div>

    <!-- Result overlay (forfeit / cancel notification) -->
    <div id="result-overlay" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="result-title">
      <div class="modal-backdrop"></div>
      <div class="modal-panel">
        <h2 id="result-title" class="modal-title"></h2>
        <p id="result-text" class="modal-text"></p>
        <div class="modal-actions">
          <a href="{% url 'shyship:lobby' %}" class="modal-button modal-button-cancel">&#8592; Shyship</a>
        </div>
      </div>
    </div>

    <script>
      window.SHYSHIP_GAME_ID = "{{ game_id }}";
      window.SHYSHIP_PLAYER_NUM = {{ player_num }};
      window.SHYSHIP_LOBBY_URL = "{% url 'shyship:lobby' %}";
    </script>
    <script src="{% static 'shyship/script.js' %}"></script>
  </body>
</html>

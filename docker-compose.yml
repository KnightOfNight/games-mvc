services:
  nginx:
    image: nginx:alpine
    container_name: game-mvc-nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-40443}:40443"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - django

  django:
    build:
      context: ./django
      dockerfile: Dockerfile
    container_name: game-mvc-django
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-game_mvc.settings.production}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DB_PASSWORD: ${DB_PASSWORD}
      DOMAIN: ${DOMAIN}
      HOST_PORT: ${HOST_PORT:-40443}
      SITE_TITLE: ${SITE_TITLE:-game-mvc}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: game-mvc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: game_mvc
      POSTGRES_USER: game_mvc
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game_mvc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: game-mvc-redis
    restart: unless-stopped

volumes:
  pgdata:

services:
  nginx:
    build:
      context: ./nginx
    container_name: game-mvc-nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-40443}:40443"
    environment:
      - DOMAIN=${DOMAIN}
      - TLS_CERT_NAME=${TLS_CERT_NAME}
    volumes:
      - ssldata:/etc/nginx/ssl:ro
    depends_on:
      - django

  django:
    build:
      context: ./django
      dockerfile: Dockerfile
    image: shyland-django
    container_name: game-mvc-django
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-game_mvc.settings.production}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DB_PASSWORD: ${DB_PASSWORD}
      DOMAIN: ${DOMAIN}
      HOST_PORT: ${HOST_PORT:-40443}
      SITE_TITLE: ${SITE_TITLE:-game-mvc}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: game-mvc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: game_mvc
      POSTGRES_USER: game_mvc
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_VOLUME:-pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game_mvc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: game-mvc-redis
    restart: unless-stopped

  ticker:
    image: shyland-django
    command: python manage.py run_tick_engine
    environment:
      - DJANGO_SETTINGS_MODULE=game_mvc.settings.production
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DB_PASSWORD=${DB_PASSWORD}
      - DOMAIN=${DOMAIN}
      - HOST_PORT=${HOST_PORT:-40443}
      - SITE_TITLE=${SITE_TITLE:-game-mvc}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  ssldata:
    external: true
    name: game-mvc_ssldata
